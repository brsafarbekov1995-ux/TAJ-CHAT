<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, update, onChildChanged, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        // --- ФУНКСИЯҲОИ НАВИ ИЛОВАШУДА ---
        window.deleteMessage = (key) => { remove(ref(db, 'messages/' + key)); };
        window.editMessage = (key, currentText) => {
            const newText = prompt("Таҳрири паём:", currentText);
            if (newText !== null && newText.trim() !== "") {
                update(ref(db, 'messages/' + key), { text: newText });
            }
        };

        window.sendMessage = (textFromDrag = null) => {
            const input = document.getElementById("message-input");
            const textToSend = textFromDrag || input.value;
            
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                if (!textFromDrag) {
                    input.value = "";
                    input.style.height = "45px";
                }
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("message-input");
            const chatBox = document.getElementById("chat-box");

            input.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            });

            input.setAttribute("draggable", "true");
            input.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", input.value));
            chatBox.addEventListener("dragover", (e) => e.preventDefault());
            chatBox.addEventListener("drop", (e) => {
                e.preventDefault();
                const text = e.dataTransfer.getData("text/plain");
                if (text) { 
                    window.sendMessage(text); 
                    input.value = ""; 
                    input.style.height = "45px";
                }
            });

            let touchStartY = 0;
            input.addEventListener("touchstart", (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
            input.addEventListener("touchend", (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                if (touchStartY - touchEndY > 50) {
                    window.sendMessage(input.value);
                    input.value = "";
                    input.style.height = "45px";
                }
            }, { passive: true });

            let lastDate = ""; 
            onChildAdded(messagesRef, (data) => {
                const msg = data.val();
                const key = data.key;
                if (msg.date !== lastDate) {
                    const dateDiv = document.createElement("div");
                    dateDiv.className = 'date-divider';
                    dateDiv.textContent = msg.date;
                    chatBox.appendChild(dateDiv);
                    lastDate = msg.date;
                }
                const div = document.createElement("div");
                div.id = "msg-" + key;
                div.className = msg.senderId === myId ? 'my-message' : 'received-message';
                
                // Иловаи тугмаҳои таҳрир ва нест кардан барои паёмҳои шахсӣ
                let actions = msg.senderId === myId ? `
                    <div class="msg-actions">
                        <span onclick="window.editMessage('${key}', '${msg.text.replace(/'/g, "\\'")}')" style="cursor:pointer; margin-right:8px;">✏️</span>
                        <span onclick="window.deleteMessage('${key}')" style="cursor:pointer;">🗑️</span>
                    </div>` : '';

                div.innerHTML = `<div>${msg.text}</div><div class="time-stamp">${msg.time}</div>${actions}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            // Навсозии фаврии UI ҳангоми тағйир ё нест шудан
            onChildChanged(messagesRef, (data) => {
                const div = document.getElementById("msg-" + data.key);
                if (div) div.querySelector('div').textContent = data.val().text;
            });
            onChildRemoved(messagesRef, (data) => {
                const div = document.getElementById("msg-" + data.key);
                if (div) div.remove();
            });
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f0f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; -webkit-text-size-adjust: 100%; }
        .header { flex: 0 0 auto; background: #ffffff; color: #333; padding: 15px; margin: 10px; text-align: center; font-weight: bold; font-size: 1.2rem; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%); }
        .my-message, .received-message { padding: 10px; max-width: 80%; word-wrap: break-word; }
        .my-message { align-self: flex-end; background: #dcf8c6; border-radius: 15px 15px 0 15px; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 15px 15px 15px 0; }
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; margin: 10px 0; }
        .time-stamp { font-size: 0.6rem; color: #888; margin-top: 4px; text-align: right; }
        .msg-actions { display: flex; justify-content: flex-end; margin-top: 5px; font-size: 12px; }
        .input-panel { flex: 0 0 auto; padding: 10px; background: #ffffff; display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid #eee; }
        textarea { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; resize: none; height: 45px; max-height: 120px; font-size: 16px; outline: none; }
    </style>
</head>
<body>
    <div class="header">TAJ CHAT</div>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
    </div>
</body>
</html>
