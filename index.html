<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAJ CHAT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgcixLDTz5qVBRpQMfxbX8WpSyff76Z28",
            databaseURL: "https://taj-chat-c87de-default-rtdb.firebaseio.com",
            projectId: "taj-chat-c87de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myId = localStorage.getItem("chat_user_id");
        if (!myId) {
            myId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("chat_user_id", myId);
        }

        window.sendMessage = (textFromDrag = null) => {
            const input = document.getElementById("message-input");
            const textToSend = textFromDrag || input.value;
            
            if (textToSend.trim() !== "") {
                const now = new Date();
                push(messagesRef, { 
                    text: textToSend, 
                    senderId: myId, 
                    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    date: now.toLocaleDateString()
                });
                if (!textFromDrag) input.value = "";
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("message-input");
            const chatBox = document.getElementById("chat-box");

            // Drag and Drop (барои компютер)
            input.setAttribute("draggable", "true");
            input.addEventListener("dragstart", (e) => e.dataTransfer.setData("text/plain", input.value));
            chatBox.addEventListener("dragover", (e) => e.preventDefault());
            chatBox.addEventListener("drop", (e) => {
                e.preventDefault();
                const text = e.dataTransfer.getData("text/plain");
                if (text) { window.sendMessage(text); input.value = ""; }
            });

            // Touch Gestures (барои телефон)
            let touchStartY = 0;
            input.addEventListener("touchstart", (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            input.addEventListener("touchend", (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                // Агар ангуштро ба боло кашад (фарқият зиёда аз 50 пиксел бошад)
                if (touchStartY - touchEndY > 50) {
                    window.sendMessage(input.value);
                    input.value = "";
                }
            }, { passive: true });
        });

        let lastDate = ""; 
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const chatBox = document.getElementById("chat-box");

            if (msg.date !== lastDate) {
                const dateDiv = document.createElement("div");
                dateDiv.className = 'date-divider';
                dateDiv.textContent = msg.date;
                chatBox.appendChild(dateDiv);
                lastDate = msg.date;
            }

            const div = document.createElement("div");
            div.className = msg.senderId === myId ? 'my-message' : 'received-message';
            div.innerHTML = `<div>${msg.text}</div><div class="time-stamp">${msg.time}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; height: 100dvh; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .my-message { align-self: flex-end; background: #dcf8c6; padding: 10px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .received-message { align-self: flex-start; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 15px 15px 15px 0; max-width: 80%; }
        .date-divider { align-self: center; background: #ccc; color: #fff; padding: 5px 15px; border-radius: 15px; font-size: 0.7rem; margin: 10px 0; }
        .time-stamp { font-size: 0.6rem; color: #888; margin-top: 4px; text-align: right; }
        .input-panel { padding: 10px; display: flex; gap: 8px; background: #fff; touch-action: none; }
        textarea { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; resize: none; height: 45px; cursor: grab; }
        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-panel">
        <textarea id="message-input" placeholder="Паём..."></textarea>
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>
</body>
</html>
